<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>{{PROJECT}} · AI Engineering Report · {{DATE}}</title>
<meta property="og:title" content="{{PROJECT}} · AI Engineering Report" />
<meta property="og:description" content="AI agents shipped features, saved time and money. See the breakdown." />
<style>
  :root { --bg:#0a0d12; --bg2:#111620; --bg3:#1a2030; --border:#1e2a3a; --text:#e2e8f0; --text2:#64748b; --green:#22c55e; --accent:#3b82f6; --yellow:#f59e0b; --purple:#a855f7; --mono:'JetBrains Mono',monospace; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
  .container{max-width:800px;margin:0 auto;padding:40px 20px}
  header{text-align:center;margin-bottom:40px}
  .logo{font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:6px}
  .dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
  h1{font-size:clamp(22px,4vw,32px);font-weight:700;margin-bottom:8px}
  .subtitle{color:var(--text2);font-size:14px}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:40px}
  .stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 20px}
  .stat-v{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:4px}
  .stat-l{font-size:12px;color:var(--text2)}
  .stat-s{font-size:11px;color:var(--text2);margin-top:4px;font-family:var(--mono)}
  h2{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:12px}
  .features{display:flex;flex-direction:column;gap:6px;margin-bottom:40px}
  .feat{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:10px}
  .feat-icon{color:var(--green);font-size:14px}
  .feat-title{flex:1;font-size:13px}
  .feat-time{font-family:var(--mono);font-size:11px;color:var(--text2)}
  footer{text-align:center;padding:40px 0 20px;font-size:12px;color:var(--text2)}
  footer a{color:var(--text2);text-decoration:none}
  footer a:hover{color:var(--text)}
  .paused{text-align:center;padding:80px 20px}
  .paused h2{font-size:20px;color:var(--text2);margin-bottom:8px;text-transform:none;letter-spacing:0}
  .paused p{color:var(--text2);font-size:14px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const metrics = {{METRICS_JSON}};
const tasks = {{TASKS_JSON}};
const project = '{{PROJECT}}';
const date = '{{DATE}}';
const paused = {{PAUSED}};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

if (paused) {
  document.getElementById('root').innerHTML = `
    <div class="container">
      <div class="logo"><div class="dot"></div>great_cto</div>
      <div class="paused">
        <h2>Report paused</h2>
        <p>The owner has temporarily disabled this link.</p>
      </div>
    </div>`;
} else {
  const m = metrics || {};
  const stats = [
    { v: m.tasks?.done ?? '—', l: 'Features shipped', s: `${m.velocity?.this_week ?? 0} this week`, c: 'var(--green)' },
    { v: m.avg_completion_min ? `${m.avg_completion_min}m` : '—', l: 'Avg completion', s: 'LLM vs human: hours', c: 'var(--accent)' },
    { v: m.cost?.savings_x ? `${m.cost.savings_x}×` : '—', l: 'Cost savings', s: m.cost?.human_usd ? `~$${Number(m.cost.human_usd).toLocaleString()} saved` : '', c: 'var(--yellow)' },
    { v: m.qa?.pass_rate != null ? `${m.qa.pass_rate}%` : '—', l: 'QA pass rate', s: '', c: 'var(--green)' },
    { v: m.security?.approved ?? '—', l: 'Security approved', s: m.security?.blocked ? `${m.security.blocked} blocked` : '', c: m.security?.blocked ? 'var(--yellow)' : 'var(--green)' },
    { v: m.tasks?.in_progress ?? '—', l: 'In progress', s: `${m.tasks?.backlog ?? 0} in backlog`, c: 'var(--accent)' },
  ];

  const featHTML = tasks.map(t => `
    <div class="feat">
      <span class="feat-icon">✓</span>
      <span class="feat-title">${esc(t.title)}</span>
      ${t.close_reason ? `<span class="feat-time">${esc(t.close_reason.substring(0,60))}</span>` : ''}
    </div>`).join('');

  document.getElementById('root').innerHTML = `
    <div class="container">
      <header>
        <div class="logo"><div class="dot"></div>great_cto · AI Engineering Report</div>
        <h1>${esc(project)}</h1>
        <div class="subtitle">${esc(date)} · Generated by great_cto agents</div>
      </header>

      <div class="stats">
        ${stats.map(s => `<div class="stat"><div class="stat-v" style="color:${s.c}">${s.v}</div><div class="stat-l">${s.l}</div>${s.s ? `<div class="stat-s">${s.s}</div>` : ''}</div>`).join('')}
      </div>

      ${tasks.length ? `<h2>Recently shipped</h2><div class="features">${featHTML}</div>` : ''}

      <footer>
        Powered by <a href="https://greatcto.systems" target="_blank">great_cto</a> ·
        AI engineering for solo founders and teams ·
        <a href="https://github.com/avelikiy/great_cto" target="_blank">GitHub</a>
      </footer>
    </div>`;
}
</script>
</body>
</html>
