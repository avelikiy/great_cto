<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Autopilot console — great_cto</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --bg:#0a0e0c; --card:#11161a; --bd:#1f2a26; --tx:#ecf2ee; --mut:#8aa; --grn:#00d97e; --amb:#f0a020; --red:#ff5a5a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--tx); font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:18px 24px; border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:14px; }
  header h1 { font-size:17px; margin:0; font-weight:600; }
  header .sub { color:var(--mut); font-size:13px; }
  main { max-width:1000px; margin:0 auto; padding:24px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  select, input, button { font:inherit; background:#0d1311; color:var(--tx); border:1px solid var(--bd); border-radius:8px; padding:8px 12px; }
  button { cursor:pointer; }
  button.primary { background:var(--grn); color:#04140d; border-color:var(--grn); font-weight:600; }
  button.reject { color:var(--red); border-color:#532; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--mut); margin:28px 0 12px; }
  .card { background:var(--card); border:1px solid var(--bd); border-radius:12px; padding:16px 18px; margin-bottom:12px; }
  .gate { border-left:3px solid var(--amb); }
  .done { border-left:3px solid var(--grn); }
  .rej { border-left:3px solid var(--red); opacity:.7; }
  .vert { font-weight:600; }
  .mut { color:var(--mut); font-size:13px; }
  .pill { font-size:11px; padding:2px 8px; border-radius:20px; border:1px solid var(--bd); }
  .pill.await { color:var(--amb); border-color:#5a4420; }
  .pill.ok { color:var(--grn); border-color:#1c5a3e; }
  .pill.rej { color:var(--red); border-color:#532; }
  ol.steps { margin:10px 0 0; padding-left:20px; font-size:13px; color:#c6d2d0; }
  ol.steps li { margin:2px 0; }
  ol.steps .h { color:var(--amb); }
  .sign { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .empty { color:var(--mut); padding:18px; }
  a.back { color:var(--mut); text-decoration:none; font-size:13px; }
  .seg { display:inline-flex; border:1px solid var(--bd); border-radius:8px; overflow:hidden; }
  .seg a { padding:6px 14px; color:var(--mut); text-decoration:none; font-size:13px; font-weight:600; }
  .seg a.on { background:var(--grn); color:#04140d; }
  .filters { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:6px 0 2px; }
  .filters select, .filters input { padding:6px 10px; font-size:13px; }
  .sla { font-size:11px; padding:2px 8px; border-radius:20px; border:1px solid var(--bd); color:var(--mut); }
  .sla.warn { color:var(--amb); border-color:#5a4420; }
  .sla.breach { color:var(--red); border-color:#532; }
  .gate-prog { font-size:12px; color:var(--mut); margin-top:4px; }
  .card.click { cursor:pointer; }
  .card.click:hover { border-color:#2d3d36; }
  #drawer-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:20; }
  #drawer { position:fixed; top:0; right:0; bottom:0; width:min(560px,92vw); background:var(--card); border-left:1px solid var(--bd); padding:22px; overflow:auto; z-index:21; transform:translateX(100%); transition:transform .18s; }
  #drawer.open { transform:none; } #drawer-bg.open { display:block; }
  #drawer h3 { margin:0 0 4px; font-size:16px; } #drawer .x { float:right; cursor:pointer; color:var(--mut); border:0; background:none; font-size:18px; }
  .aud { font-size:12px; color:#c6d2d0; border-left:2px solid var(--bd); padding-left:10px; margin:8px 0; }
  .aud div { margin:3px 0; }
  .kpi { background:#0d1311; border:1px solid var(--bd); border-radius:10px; padding:10px 16px; min-width:118px; }
  .kpi b { display:block; font-size:22px; color:var(--tx); }
  .kpi span { font-size:11px; color:var(--mut); text-transform:uppercase; letter-spacing:.04em; }
</style>
</head>
<body>
<header>
  <h1>🛂 Autopilot console</h1>
  <span class="seg"><a class="on" href="/autopilot.html">Operate</a><a id="build-link" href="/">Build</a></span>
  <span style="flex:1"></span>
  <span id="session-info" class="mut" style="font-size:13px;display:none"></span>
  <span id="role-pick"><span class="mut" style="font-size:13px">I am the</span>
  <select id="role" onchange="onRole()" style="padding:6px 10px;font-size:13px"></select></span>
  <button id="notify-btn" class="back" style="cursor:pointer;border:0" title="Get a browser push when a case lands in your queue">🔔 Notify me</button>
</header>
<main>
  <div id="start-box">
  <h2>Start a run</h2>
  <div class="row">
    <select id="vertical">
      <option value="rcm">🩺 Medical coding (rcm)</option>
      <option value="aml">🛡️ KYC/AML (aml)</option>
      <option value="soc">🔐 Managed-SOC (soc)</option>
      <option value="insurance">☂️ Insurance (insurance)</option>
      <option value="mortgage">🏠 Mortgage (mortgage)</option>
      <option value="title">🔑 Title & escrow (title)</option>
      <option value="credentialing">🪪 Credentialing (credentialing)</option>
      <option value="collections">💰 Collections (collections)</option>
      <option value="freight">🚚 Freight (freight)</option>
      <option value="cro">🧪 Clinical-trial ops (cro)</option>
      <option value="prior-auth">✅ Prior-auth (prior-auth)</option>
      <option value="legaltech">⚖️ Legal docs (legaltech)</option>
      <option value="accounting">📒 Bookkeeping (accounting)</option>
      <option value="tax">🧾 Tax (tax)</option>
      <option value="procurement">🛒 Procurement (procurement)</option>
      <option value="msp">🖥️ Managed-IT (msp)</option>
      <option value="customs">🛃 Customs (customs)</option>
      <option value="audit">📊 SOX ITGC audit (audit)</option>
      <option value="pharma">💊 Pharmacovigilance (pharma)</option>
    </select>
    <label class="mut"><input type="checkbox" id="live" /> live connectors</label>
    <input id="start-tenant" placeholder="tenant (default)" style="max-width:140px" />
    <button class="primary" onclick="startRun()">Start run</button>
  </div>
  </div>

  <div id="analytics-box">
    <h2>Analytics — is the autopilot taking work off your desk?</h2>
    <div id="stats" class="row" style="gap:14px;flex-wrap:wrap"></div>
  </div>

  <div id="team-box" style="display:none">
    <h2>Team — invite an operator to an industry</h2>
    <div class="row">
      <select id="op-role" style="min-width:240px"></select>
      <input id="op-tenant" placeholder="tenant (default)" style="max-width:150px" />
      <input id="op-name" placeholder="operator name" style="max-width:160px" />
      <input id="op-email" placeholder="operator email (optional — to send)" style="max-width:230px" />
      <button class="primary" onclick="invite()">Create invite</button>
    </div>
    <div id="invites" style="margin-top:10px"></div>
  </div>

  <h2>Inbox — awaiting a human signature</h2>
  <div class="filters">
    <span class="mut">filter:</span>
    <input id="f-tenant" placeholder="tenant (all)" style="max-width:140px" oninput="refresh()" />
    <select id="f-vertical" onchange="refresh()"><option value="">all verticals</option></select>
    <select id="f-status" onchange="refresh()">
      <option value="">all statuses</option>
      <option value="awaiting-approval">awaiting signature</option>
      <option value="completed">completed</option>
      <option value="rejected">rejected</option>
    </select>
  </div>
  <div id="inbox"></div>

  <h2>All runs</h2>
  <div id="runs"></div>
</main>
<div id="drawer-bg" onclick="closeDrawer()"></div>
<aside id="drawer"><button class="x" onclick="closeDrawer()">✕</button><div id="drawer-body"></div></aside>
<script>
const api = (p, opt) => fetch(p, opt).then(r => r.json());
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;');

const VERT = { rcm:'🩺', aml:'🛡️', soc:'🔐', insurance:'☂️', mortgage:'🏠', title:'🔑', credentialing:'🪪',
  collections:'💰', freight:'🚚', cro:'🧪', 'prior-auth':'✅', legaltech:'⚖️', accounting:'📒', tax:'🧾',
  procurement:'🛒', msp:'🖥️', customs:'🛃', audit:'📊', pharma:'💊' };
const icon = v => VERT[v] || '🤖';
const REASONS = ['meets-criteria', 'below-confidence-floor', 'policy-exception', 'insufficient-documentation', 'fraud-suspected', 'out-of-scope', 'needs-senior-review', 'other'];

// populate the vertical filter
(function () {
  const sel = document.getElementById('f-vertical');
  Object.keys(VERT).sort().forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = icon(v)+' '+v; sel.appendChild(o); });
})();
const fTenant = () => (document.getElementById('f-tenant').value || '').trim();
const fStatus = () => document.getElementById('f-status').value;
const fVert = () => document.getElementById('f-vertical').value;

// SLA — count DOWN to the regulatory/operational deadline (dueAt), not just elapsed time.
function ageMin(iso) { return Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 60000)); }
function dur(min) { const m = Math.abs(min); return m < 90 ? Math.round(m) + 'm' : m < 1440 ? (m/60).toFixed(1) + 'h' : (m/1440).toFixed(1) + 'd'; }
function slaHtml(r) {
  if (r.status !== 'awaiting-approval') return '';
  if (!r.dueAt) { const m = ageMin(r.createdAt); return `<span class="sla ${m>=240?'breach':m>=60?'warn':''}">⏱ ${dur(m)} in queue</span>`; }
  const left = (new Date(r.dueAt).getTime() - Date.now()) / 60000; // minutes to deadline
  const total = (r.slaHours || 168) * 60;
  const cls = left <= 0 ? 'breach' : left <= total * 0.25 ? 'warn' : '';
  return `<span class="sla ${cls}">⏳ ${left <= 0 ? 'OVERDUE ' + dur(left) : 'due in ' + dur(left)}</span>`;
}
// AI recommendation for the human, from the pre-gate connectors.
function recoHtml(r) {
  if (!r.recommendation) return '';
  const map = { block: ['🔴', 'AI: block', 'color:#ff5a5a;border-color:#532'], escalate: ['🟡', 'AI: escalate', 'color:#f0a020;border-color:#5a4420'], approve: ['🟢', 'AI: approve', 'color:#00d97e;border-color:#1c5a3e'] };
  const [ic, lbl, st] = map[r.recommendation] || ['', r.recommendation, ''];
  const conf = typeof r.recoConfidence === 'number' ? ' ' + Math.round(r.recoConfidence * 100) + '%' : '';
  return `<span class="pill" style="${st}" title="AI recommendation from the connector results — the human decides">${ic} ${lbl}${conf}</span>`;
}
function gateProgressHtml(run) {
  const gates = (run.steps || []).filter(s => s.gate);
  if (gates.length < 2) return '';
  const signed = gates.filter(s => s.status === 'approved').length;
  return `<div class="gate-prog">✍️ ${signed} of ${gates.length} signatures</div>`;
}
function tenantHtml(r) { return r.tenant && r.tenant !== 'default' ? `<span class="pill">${esc(r.tenant)}</span>` : ''; }

// ── RBAC: the console is the operational staff's surface. A role only sees + signs its own
// vertical(s); only admin may switch to Build; operators sign but don't start runs. ──
let ROLES = {};
let SESSION = { token: null, role: 'admin', tenant: null, label: null, name: null }; // operator session (from an invite) or local admin
const role = () => SESSION.role;
const authParams = () => SESSION.token ? '&token=' + encodeURIComponent(SESSION.token) : '&role=' + encodeURIComponent(role());
const authBody = () => SESSION.token ? { token: SESSION.token } : { role: role() };

async function initRoles() {
  ROLES = (await api('/api/autopilot/roles')).roles || {};
  // An invite token (URL ?invite= or saved) = an operator session: locked role + tenant, no picker.
  const url = new URL(location.href);
  const tok = url.searchParams.get('invite') || localStorage.getItem('gcto_invite');
  if (tok) {
    const inv = await api('/api/autopilot/invite-resolve?token=' + encodeURIComponent(tok));
    if (inv && inv.role) {
      SESSION = { token: tok, role: inv.role, tenant: inv.tenant, label: inv.roleLabel, name: inv.name };
      localStorage.setItem('gcto_invite', tok);
      document.getElementById('role-pick').style.display = 'none';
      document.getElementById('build-link').style.display = 'none';
      const si = document.getElementById('session-info');
      si.style.display = ''; si.innerHTML = `Signed in as <b>${esc(inv.name || 'operator')}</b> · ${esc(inv.roleLabel)}${inv.tenant && inv.tenant !== 'default' ? ' · tenant ' + esc(inv.tenant) : ''} · <a class="back" href="#" onclick="signOut();return false">sign out</a>`;
      applyRoleUI(); return;
    }
    localStorage.removeItem('gcto_invite'); // stale/revoked
  }
  // Local admin / role-preview picker.
  const sel = document.getElementById('role');
  const saved = localStorage.getItem('gcto_role') || 'admin';
  SESSION = { token: null, role: saved, tenant: null, label: null, name: null };
  sel.innerHTML = Object.entries(ROLES).map(([k, r]) =>
    `<option value="${k}"${k === saved ? ' selected' : ''}>${esc(r.label)}</option>`).join('');
  applyRoleUI();
}
function onRole() { SESSION.role = document.getElementById('role').value; localStorage.setItem('gcto_role', role()); applyRoleUI(); refresh(); }
function signOut() { localStorage.removeItem('gcto_invite'); location.href = '/autopilot.html'; }

function applyRoleUI() {
  const r = ROLES[role()] || { verticals: '*', canBuild: true, canStart: true };
  if (!SESSION.token) document.getElementById('build-link').style.display = r.canBuild ? '' : 'none';
  document.getElementById('start-box').style.display = r.canStart ? '' : 'none';
  document.getElementById('team-box').style.display = (role() === 'admin' && !SESSION.token) ? '' : 'none';
  if (role() === 'admin' && !SESSION.token) loadTeam();
  const allowed = r.verticals === '*' ? Object.keys(VERT) : r.verticals;
  for (const o of document.getElementById('vertical').options) o.hidden = !allowed.includes(o.value);
  const cur = document.getElementById('vertical');
  if (cur.selectedOptions[0] && cur.selectedOptions[0].hidden) cur.value = allowed[0] || 'rcm';
}

// ── Team: the admin invites an operator to an industry (mints a scoped invite link) ──
function loadTeam() {
  const sel = document.getElementById('op-role');
  if (!sel.options.length) sel.innerHTML = Object.entries(ROLES).filter(([k]) => k !== 'admin')
    .map(([k, r]) => `<option value="${k}">${esc(r.label)} (${r.verticals === '*' ? 'all' : r.verticals.join(', ')})</option>`).join('');
  loadInvites();
}
async function loadInvites() {
  const { invites } = await api('/api/autopilot/invites?role=admin');
  const el = document.getElementById('invites');
  if (!invites || !invites.length) { el.innerHTML = '<div class="empty">No operators invited yet.</div>'; return; }
  el.innerHTML = invites.map(i => {
    const link = location.origin + '/autopilot.html?invite=' + i.token;
    return `<div class="card" style="padding:10px 14px">
      <div class="row"><b>${esc(i.name || '(unnamed)')}</b><span class="pill">${esc(i.roleLabel)}</span>${i.tenant && i.tenant !== 'default' ? '<span class="pill">'+esc(i.tenant)+'</span>' : ''}<span class="pill ${i.status==='accepted'?'ok':'await'}">${esc(i.status)}</span><span style="flex:1"></span>
        <button class="back" style="border:0;cursor:pointer" onclick="copyInvite('${link}')">📋 copy link</button>
        <button class="reject" onclick="revoke('${i.token}')">revoke</button></div>
      <div class="mut" style="margin-top:4px;word-break:break-all">${esc(link)}</div>
    </div>`;
  }).join('');
}
async function invite() {
  const operatorRole = document.getElementById('op-role').value;
  const tenant = (document.getElementById('op-tenant').value || '').trim() || 'default';
  const name = (document.getElementById('op-name').value || '').trim();
  const email = (document.getElementById('op-email').value || '').trim();
  const r = await api('/api/autopilot/invite', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ operatorRole, tenant, name, email, role:'admin' }) });
  if (r.error) { alert(r.error); return; }
  const link = r.link || (location.origin + '/autopilot.html?invite=' + r.invite.token);
  if (email && r.emailed) alert('Invite emailed to ' + email + ' ✓\n\n' + link);
  else { if (email) alert('Email relay unavailable — copy the link instead:\n\n' + link); copyInvite(link); }
  document.getElementById('op-name').value = ''; document.getElementById('op-email').value = '';
  loadInvites();
}
function copyInvite(link) { navigator.clipboard.writeText(link).then(() => alert('Invite link copied — send it to the operator:\n\n' + link)).catch(() => prompt('Copy the invite link:', link)); }
async function revoke(token) { await fetch('/api/autopilot/invite?role=admin&revoke=' + encodeURIComponent(token), { method:'DELETE' }); loadInvites(); }

let RUNS = {}; // id → run, for the detail drawer
function openDrawer(id) {
  const r = RUNS[id]; if (!r) return;
  const aud = (r.audit || []).map(a => `<div>• <b>${esc(a.event)}</b> ${a.by ? 'by ' + esc(a.by) : ''} <span class="mut">${esc((a.at || '').replace('T', ' ').slice(0, 19))}</span>${a.reason ? ' · <span style="color:#8aa">' + esc(a.reason) + '</span>' : ''}${a.override ? ' · <b style="color:#f0a020">⚠ override (AI: ' + esc(a.aiRecommendation || '?') + ')</b>' : ''}${a.note ? ' — ' + esc(a.note) : ''}</div>`).join('');
  document.getElementById('drawer-body').innerHTML = `
    <h3>${icon(r.vertical)} ${esc(r.vertical)} <span class="mut" style="font-size:13px">${esc(r.status)}</span></h3>
    <div class="mut">${esc(r.id)}${r.tenant && r.tenant !== 'default' ? ' · tenant ' + esc(r.tenant) : ''}</div>
    <div class="row" style="margin-top:6px">${recoHtml(r)}${slaHtml(r)}</div>
    <div class="mut" style="margin-top:6px">Accountable owner: <b>${esc(r.owner || r.signer || '—')}</b></div>${r.disposition ? '<div class="mut">disposition: <b>' + esc(r.disposition) + '</b></div>' : ''}
    ${gateProgressHtml(r)}
    ${stepsHtml(r)}
    <h2 style="margin-top:18px">Audit trail</h2>
    <div class="aud">${aud || '<span class="mut">no events</span>'}</div>
    <div class="row" style="margin-top:14px">
      <button class="primary" onclick="exportRun('${r.id}')">⬇ Export audit (JSON)</button>
    </div>`;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-bg').classList.add('open');
}
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-bg').classList.remove('open'); }
function exportRun(id) {
  const r = RUNS[id]; if (!r) return;
  const blob = new Blob([JSON.stringify(r, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = id + '.json'; a.click();
}

function stepsHtml(run) {
  return '<ol class="steps">' + run.steps.map(s => {
    if (s.gate) {
      const t = s.status === 'approved' ? '✅ signed' + (s.approvedBy ? ' · ' + esc(s.approvedBy) : '')
        : s.status === 'awaiting-human' ? '⏳ awaiting signature' : esc(s.status);
      return '<li class="h">🧑‍⚖️ ' + esc(s.does) + ' — <b>' + t + '</b></li>';
    }
    if (s.status === 'gated') return '<li>⏸️ ' + esc(s.does) + ' — awaits approval</li>';
    const tools = (s.toolCalls||[]).map(c => c.connector + (c.mode==='live'?'·live':'') + (c.ok?'✓':'✗')).join(' ');
    return '<li>🤖 ' + esc(s.does) + (tools ? ' · <span class="mut">'+esc(tools)+'</span>' : '') + '</li>';
  }).join('') + '</ol>';
}

function q(status) {
  const p = new URLSearchParams();
  if (status) p.set('status', status);
  if (SESSION.token) p.set('token', SESSION.token);
  else { p.set('role', role()); if (fTenant()) p.set('tenant', fTenant()); }
  return '/api/autopilot/runs?' + p.toString();
}
const byVert = runs => fVert() ? runs.filter(r => r.vertical === fVert()) : runs;
const cache = runs => { runs.forEach(r => { RUNS[r.id] = r; }); return runs; };

async function loadInbox() {
  const { runs } = await api(q('awaiting-approval'));
  const el = document.getElementById('inbox');
  const list = cache(byVert(runs)).sort((a,b) => ageMin(b.createdAt) - ageMin(a.createdAt)); // oldest-waiting first
  if (!list.length) { el.innerHTML = '<div class="empty">Inbox empty — no cases awaiting your signature.</div>'; return; }
  el.innerHTML = list.map(r => `
    <div class="card gate">
      <div class="row"><span class="vert">${icon(r.vertical)} ${esc(r.vertical)}</span><span class="pill await">awaiting signature</span>${r.escalated ? '<span class="pill" style="color:#f0a020;border-color:#5a4420">↑ escalated</span>' : ''}${recoHtml(r)}${slaHtml(r)}${tenantHtml(r)}<span class="mut">${esc(r.id)}</span><span style="flex:1"></span><button class="back" style="border:0;cursor:pointer" onclick="openDrawer('${r.id}')">⋯ details</button></div>
      <div class="mut" style="margin-top:6px"><b>${esc(r.signer)}</b> must sign <b>${esc(r.pausedAt)}</b>: ${esc(r.gateDoes)}</div>
      ${gateProgressHtml(r)}
      ${stepsHtml(r)}
      <div class="sign">
        <input id="by-${r.id}" placeholder="your name (the signer)" style="min-width:180px" />
        <select id="reason-${r.id}" title="disposition / reason code">${REASONS.map(x => `<option value="${x}">${x}</option>`).join('')}</select>
        <input id="note-${r.id}" placeholder="note (optional)" style="flex:1;min-width:140px" />
        <button class="primary" onclick="decide('${r.id}','approve')">Approve &amp; run the write</button>
        <button class="reject" onclick="decide('${r.id}','reject')">Reject</button>
        <button class="back" style="border:1px solid var(--bd);cursor:pointer" onclick="decide('${r.id}','escalate')">↑ Escalate</button>
        <button class="back" style="border:1px solid var(--bd);cursor:pointer" onclick="decide('${r.id}','send-back')">↩ Send back</button>
      </div>
    </div>`).join('');
}

async function loadRuns() {
  const { runs } = await api(q(fStatus()));
  const el = document.getElementById('runs');
  const list = cache(byVert(runs));
  if (!list.length) { el.innerHTML = '<div class="empty">No runs match — start one above or clear the filter.</div>'; return; }
  el.innerHTML = list.map(r => {
    const cls = r.status === 'completed' ? 'done' : r.status === 'rejected' ? 'rej' : 'gate';
    const pill = r.status === 'completed' ? '<span class="pill ok">completed</span>'
      : r.status === 'rejected' ? '<span class="pill rej">rejected</span>'
      : '<span class="pill await">' + esc(r.status) + '</span>';
    const aud = (r.audit||[]).map(a => a.event + (a.by?'('+esc(a.by)+')':'')).join(' → ');
    return `<div class="card click ${cls}" onclick="openDrawer('${r.id}')">
      <div class="row"><span class="vert">${icon(r.vertical)} ${esc(r.vertical)}</span>${pill}${recoHtml(r)}${slaHtml(r)}${tenantHtml(r)}<span class="mut">${esc(r.id)}</span></div>
      <div class="mut" style="margin-top:4px">${esc(aud)}</div>
      ${gateProgressHtml(r)}
      ${stepsHtml(r)}
    </div>`;
  }).join('');
}

async function startRun() {
  const vertical = document.getElementById('vertical').value;
  const mode = document.getElementById('live').checked ? 'live' : 'stub';
  const tenant = (document.getElementById('start-tenant').value || '').trim() || undefined;
  const r = await api('/api/autopilot/start', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ vertical, mode, tenant, ...authBody() }) });
  if (r.error) alert(r.error);
  refresh();
}
async function decide(id, action) {
  const by = (document.getElementById('by-'+id).value || '').trim() || 'board user';
  const note = document.getElementById('note-'+id).value || '';
  const reason = (document.getElementById('reason-'+id) || {}).value || '';
  const r = await api('/api/autopilot/' + action, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id, by, note, reason, ...authBody() }) });
  if (r.error) alert(r.error);
  refresh();
}
async function loadStats() {
  const p = new URLSearchParams();
  if (SESSION.token) p.set('token', SESSION.token); else { p.set('role', role()); if (fTenant()) p.set('tenant', fTenant()); }
  const s = await api('/api/autopilot/stats?' + p.toString());
  const tile = (label, val) => `<div class="kpi"><b>${val == null ? '—' : val}</b><span>${label}</span></div>`;
  document.getElementById('stats').innerHTML =
    tile('total runs', s.total) + tile('completed', s.completed) + tile('awaiting', s.awaiting) +
    tile('approval rate', s.approvalRate == null ? '—' : s.approvalRate + '%') +
    tile('escalation rate', s.escalationRate == null ? '—' : s.escalationRate + '%') +
    tile('avg time→decision', s.avgTimeToDecisionMin == null ? '—' : s.avgTimeToDecisionMin + 'm') +
    tile('SLA breaches', s.slaBreaches) + tile('rejected', s.rejected) +
    tile('escalated', s.escalated) + tile('sent back', s.sentBack) + tile('AI overrides', s.overrides);
}
function refresh() { loadInbox(); loadRuns(); loadStats(); }
initRoles().then(refresh);
setInterval(refresh, 4000);

// ── Browser push: get a notification when a case lands in your queue ──
(function () {
  var btn = document.getElementById('notify-btn');
  if (!btn || !('serviceWorker' in navigator) || !('PushManager' in window)) { if (btn) btn.style.display = 'none'; return; }
  btn.addEventListener('click', async function () {
    try {
      if ((await Notification.requestPermission()) !== 'granted') { btn.textContent = '🔔 blocked'; return; }
      var reg = await navigator.serviceWorker.register('/sw.js');
      var pub = (await (await fetch('/api/push/vapid-key')).json()).publicKey;
      var raw = atob(pub.replace(/-/g, '+').replace(/_/g, '/'));
      var key = Uint8Array.from(raw, function (c) { return c.charCodeAt(0); });
      var sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: key });
      await fetch('/api/push/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub.toJSON()) });
      btn.textContent = '🔔 on';
    } catch (e) { btn.textContent = '🔔 error'; }
  });
})();
</script>
