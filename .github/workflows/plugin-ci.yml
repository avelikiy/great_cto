name: Plugin CI

on:
  push:
    branches: [main, master]
    paths:
      - "commands/**"
      - "agents/**"
      - "skills/**"
      - ".claude-plugin/**"
      - "tests/**"
      - ".github/workflows/plugin-ci.yml"
  pull_request:
    paths:
      - "commands/**"
      - "agents/**"
      - "skills/**"
      - ".claude-plugin/**"
      - "tests/**"
      - ".github/workflows/plugin-ci.yml"

jobs:
  structural:
    name: Structural validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate plugin contracts
        run: python3 tests/structural/validate.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Docs reference in sync with agents/commands
        run: node scripts/gen-docs-reference.mjs --check
      - name: Docs reference generator tests
        run: node --test tests/docs/*.test.mjs

  archetype-e2e:
    name: Archetype detection e2e (23 fixtures)
    runs-on: ubuntu-latest
    needs: structural
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/cli/package-lock.json
      - name: Install & build CLI
        working-directory: packages/cli
        run: npm ci && npm run build
      - name: Run fixture-based e2e suite
        run: node tests/run-archetype-e2e.mjs
