name: Plugin CI

on:
  push:
    branches: [main, master]
    paths:
      - "commands/**"
      - "agents/**"
      - "skills/**"
      - ".claude-plugin/**"
      - "tests/**"
      - ".github/workflows/plugin-ci.yml"
  pull_request:
    paths:
      - "commands/**"
      - "agents/**"
      - "skills/**"
      - ".claude-plugin/**"
      - "tests/**"
      - ".github/workflows/plugin-ci.yml"

jobs:
  structural:
    name: Structural validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for the changed-agents coverage diff
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate plugin contracts
        run: python3 tests/structural/validate.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Docs reference in sync with agents/commands
        run: node scripts/gen-docs-reference.mjs --check
      - name: Docs reference generator tests
        run: node --test tests/docs/*.test.mjs
      - name: Eval-infra unit tests (runner / gate / gp-schema / coverage / cost-meter)
        run: node --test tests/eval/runner.test.mjs tests/eval/eval-gate.test.mjs tests/eval/gp-schema.test.mjs tests/eval/coverage-gate.test.mjs scripts/lib/cost-meter.test.mjs
      - name: Agent → EVAL coverage gate (changed agents)
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD -- 'agents/*.md' | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then
            echo "Changed agents: $CHANGED"
            node scripts/coverage-gate.mjs --changed $CHANGED
          else
            echo "No agent files changed — coverage gate skipped."
          fi

  archetype-e2e:
    name: Archetype detection e2e (23 fixtures)
    runs-on: ubuntu-latest
    needs: structural
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/cli/package-lock.json
      - name: Install & build CLI
        working-directory: packages/cli
        run: npm ci && npm run build
      - name: Run fixture-based e2e suite
        run: node tests/run-archetype-e2e.mjs
