name: Weekly Telemetry Insights

# Runs every Monday at 06:00 UTC. Pulls aggregates from the Cloudflare D1
# behind the telemetry Worker, generates a markdown report, and opens a PR.
#
# Why a PR instead of a direct commit:
#   - Maintainer reviews the numbers before they land — reduces "garbage
#     summary because metric was misnamed last week" risk.
#   - The PR diff IS the trend signal: easy to compare last week to this
#     week directly in the GitHub UI.
#   - Decisions tied to commits = an audit trail for product-direction
#     calls grounded in data.

on:
  schedule:
    - cron: "0 6 * * 1"   # 06:00 UTC every Monday
  workflow_dispatch:
    inputs:
      week:
        description: "ISO year-week (e.g., 2026-W19) — leave blank for last completed week"
        required: false
        type: string

permissions:
  contents: write   # to push the insights branch
  pull-requests: write   # to open the PR

jobs:
  insights:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Generate weekly insights
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.week }}" ]; then
            bash scripts/weekly-telemetry.sh --week "${{ inputs.week }}"
          else
            bash scripts/weekly-telemetry.sh
          fi

      - name: Open PR
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          commit-message: "chore(insights): weekly telemetry report"
          branch: insights/weekly
          delete-branch: true
          title: "chore(insights): weekly telemetry report"
          body: |
            Auto-generated by `.github/workflows/weekly-insights.yml` (cron Mon 06:00 UTC).

            Action items live inside the report file. Approve & merge to land
            the snapshot. If the numbers look wrong, close this PR and inspect
            `scripts/weekly-telemetry.sh` directly — D1 is unaffected.

            ## How to use this

            1. Skim the **Headline** — week-over-week trend signal.
            2. Open §2 (failures) — anything red blocks merge until triaged.
            3. Open §3 (archetypes) — drift signal for product focus.
            4. Compare §4 (perf) row-by-row with the previous report.

            See [docs/PRIVACY.md](../docs/PRIVACY.md) for what data feeds this.
          labels: |
            insights
            telemetry
