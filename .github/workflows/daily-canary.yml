name: Daily Canary

# Synthetic new-user smoke test. Every day, on every supported OS × Node combo,
# a fresh runner exercises the cold-install path:
#   1. npx great-cto@latest --version
#   2. cold init in an empty directory
#   3. plugin sync side-effects (PROJECT.md, ~/.claude/agents/*)
#   4. list-rules / scan / board API smoke
# If anything goes red, an issue is auto-opened with the run URL + the
# matrix cell that failed. This is the "production health" signal users
# can rely on — distinct from PR CI which only tests the working tree.

on:
  schedule:
    # 06:00 UTC daily — early enough to catch overnight breaks before EU/US
    # workdays start. Cron uses UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Where to install great-cto from"
        required: false
        default: local
        type: choice
        options: [local, npm]

permissions:
  contents: read
  issues: write   # for auto-opening canary-failed issues

jobs:
  canary:
    name: Canary (${{ matrix.os }} / Node ${{ matrix.node }} / ${{ matrix.source }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["18.17", "20", "22"]
        # 'local' = working tree (fast feedback for PRs);
        # 'npm'   = published artifact (real new-user path).
        # On scheduled runs we exercise BOTH; on manual we honour the input.
        source: [local, npm]
        exclude:
          # Trim cells that don't add coverage:
          - { node: "18.17", source: "npm" }   # 18.17 mostly redundant on npm path
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: matrix.source == 'local'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install Python (for board JSON validation in canary script)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      # --- LOCAL source: build CLI dist before running canary ---------------
      - name: Build CLI (local source only)
        if: matrix.source == 'local'
        working-directory: packages/cli
        run: |
          npm install --silent --no-fund --no-audit
          npm run build

      - name: Run canary
        id: canary
        shell: bash
        run: |
          if [ "${{ matrix.source }}" = "local" ]; then
            bash scripts/canary.sh local
          else
            # NPM source: download canary script standalone (no checkout needed).
            curl -sf -o /tmp/canary.sh \
              https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/canary.sh
            chmod +x /tmp/canary.sh
            bash /tmp/canary.sh npm
          fi

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const cell = `${{ matrix.os }} / Node ${{ matrix.node }} / ${{ matrix.source }}`;
            const title = `🚨 Daily canary failed — ${cell}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);

            // Don't spam — if there's already an open canary issue for this cell, skip.
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'canary',
              per_page: 100,
            });
            const dup = open.data.find(i => i.title.includes(cell));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Still failing on ${date}. Run: ${runUrl}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['canary', 'P1'],
              body: [
                `Synthetic new-user canary failed on **${cell}**.`,
                ``,
                `**Run:** ${runUrl}`,
                `**Date:** ${date}`,
                ``,
                `## What this means`,
                ``,
                `A fresh CI runner reproducing the new-user cold-install path`,
                `(\`npx great-cto@latest init\` on an empty repo) hit a failure.`,
                `If \`source: npm\` cell is failing, real users hitting npm right`,
                `now are seeing the same break.`,
                ``,
                `## Triage`,
                ``,
                `1. Open the run URL above and find the failed step.`,
                `2. Reproduce locally: \`bash scripts/canary.sh ${{ matrix.source }}\`.`,
                `3. If broken on \`local\` only — working-tree regression; revert PR.`,
                `4. If broken on \`npm\` only — published-artifact issue; check`,
                `   \`packages/cli/dist/\` and \`package.json\` files.`,
                ``,
                `Auto-closed by next green run.`,
              ].join('\n'),
            });

      - name: Close stale canary issues on success
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const cell = `${{ matrix.os }} / Node ${{ matrix.node }} / ${{ matrix.source }}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'canary',
              per_page: 100,
            });
            for (const i of open.data) {
              if (!i.title.includes(cell)) continue;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: i.number,
                body: `✅ Canary green for **${cell}** as of ${new Date().toISOString()}. Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: i.number,
                state: 'closed',
              });
            }
