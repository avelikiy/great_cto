name: UI e2e (Playwright)

on:
  push:
    branches: [main]
    paths:
      - 'packages/board/**'
      - 'tests/ui/**'
      - '.github/workflows/ui-e2e.yml'
  pull_request:
    paths:
      - 'packages/board/**'
      - 'tests/ui/**'
      - '.github/workflows/ui-e2e.yml'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/ui/package.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install bd (Beads) from source
        run: |
          go install github.com/steveyegge/beads/cmd/bd@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          "$HOME/go/bin/bd" --help > /dev/null && echo "bd installed"

      - name: Install Playwright dependencies
        working-directory: tests/ui
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: tests/ui
        env:
          CI: 'true'
        run: npx playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 7

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: tests/ui/test-results/
          retention-days: 7
