name: Deploy landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build site
        # site/**/*.html is .gitignored — must be regenerated on every deploy
        # from tracked source files (site/data/*.json, site/**/*.mjs).
        run: node site/_build.mjs

      - name: Sanity check — required pages exist
        run: |
          for f in site/index.html site/packs.html site/companies.html site/agents.html site/sitemap.xml; do
            [ -s "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "✓ critical pages built ($(ls site/for/*.html | wc -l) archetype, $(ls site/pack/*.html | wc -l) pack)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=great-cto-site --branch=main --commit-dirty=true
