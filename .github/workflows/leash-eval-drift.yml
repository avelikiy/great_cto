# Continuous drift detection for llm-leash policy rules.
#
# Runs `llm-leash eval-record` once a day against the golden dataset and
# uploads the metrics JSONL as a workflow artefact. If the CLI exits 1
# (drift > drift_threshold pp vs 7-day baseline), opens an issue tagged
# `leash-drift` so the on-call sees it next time they open /inbox.
#
# Why daily and not per-PR: eval is stochastic (LLM-backed rules use cheap
# classifiers that sample). PR-level noise would mask real regressions.
# Daily averages out the noise; weekly trend in the issue body shows the
# real direction.

name: leash-eval-drift

on:
  schedule:
    - cron: "0 4 * * *"          # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      drift_threshold:
        description: "F1 drop (in pp) that triggers a regression"
        required: false
        default: "0.05"
      dataset:
        description: "Path to eval dataset (relative to llm-leash repo)"
        required: false
        default: "tests/fixtures/eval/jailbreaks_v1.jsonl"

permissions:
  contents: read
  issues: write

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout great_cto
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install llm-leash from main
        run: |
          git clone --depth=1 https://github.com/avelikiy/llm-leash.git "$RUNNER_TEMP/llm-leash"
          python -m pip install --upgrade pip
          pip install -e "$RUNNER_TEMP/llm-leash[all]"

      - name: Run eval-record (drift gate)
        id: eval
        env:
          DRIFT_THRESHOLD: ${{ github.event.inputs.drift_threshold || '0.05' }}
          DATASET: ${{ github.event.inputs.dataset || 'tests/fixtures/eval/jailbreaks_v1.jsonl' }}
          METRICS_PATH: /tmp/leash-eval-metrics.jsonl
        run: |
          # Resolve dataset path relative to the leash clone
          DATASET_ABS="$RUNNER_TEMP/llm-leash/$DATASET"
          if [ ! -f "$DATASET_ABS" ]; then
            echo "::error::dataset not found: $DATASET_ABS"
            ls "$RUNNER_TEMP/llm-leash/tests/fixtures/eval/" || true
            exit 1
          fi
          # Run eval-record. Exits 1 on drift.
          set +e
          LLM_LEASH_EVAL_METRICS_PATH="$METRICS_PATH" \
            llm-leash eval-record \
              --dataset "$DATASET_ABS" \
              --drift-threshold "$DRIFT_THRESHOLD" \
              > /tmp/eval-output.txt 2>&1
          EXIT=$?
          set -e
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          cat /tmp/eval-output.txt
          if [ ! -f "$METRICS_PATH" ]; then
            echo "::warning::no metrics file produced — eval-record may have errored before write"
            exit 1
          fi

      - name: Upload metrics artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leash-eval-metrics
          path: |
            /tmp/leash-eval-metrics.jsonl
            /tmp/eval-output.txt
          retention-days: 90

      - name: Open issue on drift
        if: steps.eval.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('/tmp/eval-output.txt')
              ? fs.readFileSync('/tmp/eval-output.txt', 'utf8').slice(0, 4000)
              : '(no eval output captured)';
            const today = new Date().toISOString().slice(0, 10);
            const title = `🚨 leash detection drift detected — ${today}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                'The daily eval-record job detected that one or more leash policy rules dropped',
                'F1 by more than the configured drift threshold versus the 7-day baseline.',
                '',
                '## Detector output',
                '```',
                body,
                '```',
                '',
                '## Actions',
                '- Inspect the `leash-eval-metrics` artefact attached to the workflow run',
                '- Open Security → Review in the board to see drifting rules',
                '- If the drift is real, retrain / retune the rule. If false-positive of the drift detector,',
                '  bump `drift_threshold` in the workflow inputs.',
                '',
                `Workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              ].join('\n'),
              labels: ['leash-drift', 'automated'],
            });
