name: Weekly Telemetry Insights (email)

# Runs every Monday at 06:00 UTC. Two responsibilities:
#
#   1. Smoke-test the telemetry pipeline end-to-end (HTTP → Worker → D1).
#      Even when 0 real events arrive, we verify the pipe is alive so the
#      first real user's event won't silently disappear into a broken Worker.
#
#   2. Generate the weekly insights report and decide whether to email it:
#      - >= EVENT_THRESHOLD real events    → send full data report
#      - smoke test failed                 → send "🚨 pipeline broken" alert
#      - first Monday of month, < threshold → send "alive ping" (so the
#        maintainer knows the workflow itself is still running)
#      - otherwise                         → SKIP email (avoid noise)
#
# The threshold prevents "_(no data)_" emails every Monday for 6 months
# before the user base reaches a level where weekly stats mean anything.
#
# Why email (not commit, not Slack, not Issue):
#   1. Private by default — pre-PMF numbers stay out of competitor reach.
#   2. Lands in maintainer's inbox where he already reviews things.
#   3. Zero infrastructure to add (no Slack workspace, no Discord webhook).
#   4. Markdown renders well in modern email clients (Gmail, etc).
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN    — D1: Read+Edit scope on great-cto-telemetry
#                             (Edit needed for smoke test cleanup DELETE)
#   CLOUDFLARE_ACCOUNT_ID   — 8b4c82576661609fadcac6ae8a5b2708
#   SMTP_USERNAME           — Gmail address
#   SMTP_PASSWORD           — Gmail App Password (16-char token,
#                             from myaccount.google.com/apppasswords)
#   INSIGHTS_RECIPIENT      — destination email
#
# Setup guide: docs/INSIGHTS-EMAIL-SETUP.md (private — gitignored)

on:
  schedule:
    - cron: "0 6 * * 1"   # 06:00 UTC every Monday
  workflow_dispatch:
    inputs:
      week:
        description: "ISO year-week (e.g., 2026-W19) — leave blank for last completed week"
        required: false
        type: string
      force_send:
        description: "Send email regardless of threshold (use for testing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  WORKER_URL: https://telemetry.greatcto.systems
  EVENT_THRESHOLD: "10"   # Minimum events to trigger a data report

jobs:
  email-report:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler@4

      # ─── PIPELINE SMOKE TEST ─────────────────────────────────────────────
      # POST a synthetic event with a unique anon_id derived from the GitHub
      # run id, verify it lands in D1 within 5 sec, then DELETE it so the
      # smoke event never pollutes weekly stats.
      - name: Smoke test pipeline (HTTP → Worker → D1)
        id: smoke
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # IMPORTANT: this step must NEVER exit non-zero. All failure modes are
        # captured in smoke_status output so the email layer can report them.
        # Workflow continues regardless — broken pipeline becomes an email,
        # not a workflow failure (which would be invisible without notifications).
        continue-on-error: true
        run: |
          set +e   # No early-exit on subcommand failure — capture everything
          set -u

          SMOKE_ANON=$(printf '%08x' $(( ${{ github.run_id }} % 4294967295 )))
          echo "smoke_anon=$SMOKE_ANON" >> "$GITHUB_OUTPUT"
          SMOKE_TS="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"

          # ─── Step 1/3: POST event ──────────────────────────────────────
          echo "▸ POST synthetic event with anon_id=$SMOKE_ANON"
          HTTP=$(curl -sS -o /tmp/smoke-resp.json -w '%{http_code}' \
            -X POST "$WORKER_URL/v1/event" \
            -H "Content-Type: application/json" \
            -d "{\"ts\":\"$SMOKE_TS\",\"version\":\"2.7.0\",\"command\":\"telemetry\",\"archetype\":\"none\",\"node\":\"20.0.0\",\"os\":\"linux\",\"exit_code\":0,\"duration_ms\":1,\"anon_id\":\"$SMOKE_ANON\"}")
          echo "  HTTP $HTTP · resp: $(cat /tmp/smoke-resp.json)"
          if [ "$HTTP" != "200" ]; then
            echo "smoke_status=worker_post_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Allow eventual consistency (D1 is fast but not instant).
          sleep 3

          # ─── Step 2/3: Verify event landed in D1 ───────────────────────
          # Use Cloudflare REST API directly (more diagnostic than wrangler).
          # DB UUID from workers/telemetry/wrangler.toml.
          DB_ID=b847fd59-b198-46c7-86a5-eb0055d085d3
          echo "▸ Query D1 via REST API for the smoke event"
          curl -sS -o /tmp/smoke-d1.json -w 'HTTP %{http_code}\n' \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$DB_ID/query" \
            -d "{\"sql\":\"SELECT COUNT(*) AS c FROM events WHERE anon_id='$SMOKE_ANON';\"}"
          echo "  D1 response:"
          head -c 500 /tmp/smoke-d1.json; echo

          # Parse via jq — handles both success and error shapes without
          # multi-line python (which breaks YAML indentation in workflows).
          COUNT=$(jq -r 'if .success == true then (.result[0].results[0].c // "ERR") else "ERR" end' /tmp/smoke-d1.json 2>/dev/null || echo "ERR")
          if [ "$COUNT" = "ERR" ]; then
            echo "  parse/error path — D1 response was:"
            jq -r '.errors // .' /tmp/smoke-d1.json 2>/dev/null | head -5 || head -c 300 /tmp/smoke-d1.json
          fi
          echo "  found: $COUNT row(s)"

          if [ "$COUNT" = "1" ]; then
            echo "smoke_status=ok" >> "$GITHUB_OUTPUT"
          elif [ "$COUNT" = "ERR" ]; then
            # D1 query failed — could be auth scope, network, or D1 outage.
            # Worker POST returned 200, so the pipe LIKELY works; we just
            # can't verify from this side. Treat as soft warning, not alert.
            echo "smoke_status=d1_query_blocked" >> "$GITHUB_OUTPUT"
          else
            echo "smoke_status=d1_write_missing" >> "$GITHUB_OUTPUT"
          fi

          # ─── Step 3/3: Cleanup (best-effort) ───────────────────────────
          echo "▸ Cleanup smoke event"
          curl -sS -o /tmp/smoke-cleanup.json -w 'HTTP %{http_code}\n' \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$DB_ID/query" \
            -d "{\"sql\":\"DELETE FROM events WHERE anon_id='$SMOKE_ANON';\"}" || true
          head -c 200 /tmp/smoke-cleanup.json; echo

          exit 0

      # ─── REPORT GENERATION ───────────────────────────────────────────────
      - name: Generate weekly insights + count events
        id: report
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WEEK_INPUT:            ${{ inputs.week }}
        run: |
          set -euo pipefail
          if [ -n "${WEEK_INPUT:-}" ]; then
            bash scripts/weekly-telemetry.sh --week "$WEEK_INPUT" --dry-run > /tmp/insights.md
            WEEK="$WEEK_INPUT"
          else
            WEEK=$(date -u -d 'last week' '+%G-W%V')
            bash scripts/weekly-telemetry.sh --dry-run > /tmp/insights.md
          fi
          echo "week=$WEEK" >> "$GITHUB_OUTPUT"

          # Direct D1 query for total real events in last 7 days
          # (filter out our smoke pattern just in case cleanup missed).
          EVENTS=$(wrangler d1 execute great-cto-telemetry --remote --json \
            --command "SELECT COUNT(*) AS c FROM events WHERE received_at >= datetime('now','-7 days') AND command != 'telemetry';" 2>/dev/null \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)[0]["results"][0]["c"])')
          echo "events=$EVENTS" >> "$GITHUB_OUTPUT"
          echo "▸ events in window: $EVENTS · threshold: ${{ env.EVENT_THRESHOLD }}"

          echo "--- preview (first 25 lines) ---"
          head -25 /tmp/insights.md

      # ─── DECIDE: send / skip / alert ─────────────────────────────────────
      - name: Decide email policy
        id: decide
        env:
          SMOKE: ${{ steps.smoke.outputs.smoke_status }}
          EVENTS: ${{ steps.report.outputs.events }}
          FORCE: ${{ inputs.force_send }}
        run: |
          set -euo pipefail
          DAY=$(date -u +%-d)   # day of month, no leading zero
          MONTHLY_PING=0
          [ "$DAY" -le 7 ] && MONTHLY_PING=1

          # Pipeline-broken status fires an alert regardless of threshold.
          # d1_query_blocked is a soft warning — POST worked, can't verify
          # write. Still proceed with normal email decision.
          if [ "$SMOKE" = "worker_post_failed" ] || [ "$SMOKE" = "d1_write_missing" ]; then
            echo "send=true"  >> "$GITHUB_OUTPUT"
            echo "kind=alert" >> "$GITHUB_OUTPUT"
            echo "subject=🚨 great_cto telemetry pipeline broken — $SMOKE" >> "$GITHUB_OUTPUT"
          elif [ "$FORCE" = "true" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
            echo "kind=forced" >> "$GITHUB_OUTPUT"
            echo "subject=great_cto · weekly insights · ${{ steps.report.outputs.week }} (force)" >> "$GITHUB_OUTPUT"
          elif [ "$EVENTS" -ge "${{ env.EVENT_THRESHOLD }}" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
            echo "kind=data" >> "$GITHUB_OUTPUT"
            echo "subject=great_cto · weekly insights · ${{ steps.report.outputs.week }} · $EVENTS events" >> "$GITHUB_OUTPUT"
          elif [ "$MONTHLY_PING" = "1" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
            echo "kind=alive" >> "$GITHUB_OUTPUT"
            echo "subject=great_cto · monthly alive ping · pipeline OK · $EVENTS events this week" >> "$GITHUB_OUTPUT"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "kind=skip" >> "$GITHUB_OUTPUT"
            echo "▸ Skipping email: $EVENTS events < threshold ${{ env.EVENT_THRESHOLD }} and not first week of month."
          fi

      # ─── ALIVE PING: tiny markdown ──────────────────────────────────────
      - name: Prepare alive-ping body
        if: steps.decide.outputs.kind == 'alive'
        run: |
          cat > /tmp/insights.md <<EOF
          # great_cto telemetry — monthly alive ping

          - Week: **${{ steps.report.outputs.week }}**
          - Events this week: **${{ steps.report.outputs.events }}**
          - Smoke test: **✅ pipeline OK** (HTTP → Worker → D1, smoke anon_id=${{ steps.smoke.outputs.smoke_anon }})
          - Threshold for full report: **${{ env.EVENT_THRESHOLD }} events** (not yet reached)

          No action needed. The pipeline is alive and ready when real users opt in. You'll get the next email when either:

          1. Events crosses the threshold of ${{ env.EVENT_THRESHOLD }} per week, or
          2. Pipeline smoke test fails (would surface here as 🚨), or
          3. First Monday of the next month (this same alive ping).

          ---

          *Generated $(date -u +%Y-%m-%dT%H:%M:%SZ) by .github/workflows/weekly-insights-email.yml*
          EOF

      # ─── ALERT BODY (pipeline broken) ───────────────────────────────────
      - name: Prepare alert body
        if: steps.decide.outputs.kind == 'alert'
        run: |
          cat > /tmp/insights.md <<EOF
          # 🚨 great_cto telemetry pipeline broken

          The weekly health check failed at step: **${{ steps.smoke.outputs.smoke_status }}**

          - **worker_post_failed** — POST to \`$WORKER_URL/v1/event\` did not return 200.
            Worker may be down, schema validation regressed, or DNS broken.
          - **d1_write_missing** — POST succeeded but the event never appeared in D1.
            Possible: D1 outage, binding misconfigured, or race condition we should investigate.

          ## Triage

          1. Check workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          2. Reproduce locally:
             \`\`\`
             curl -X POST $WORKER_URL/v1/health
             curl -X POST $WORKER_URL/v1/event -H 'Content-Type: application/json' -d '{...}'
             \`\`\`
          3. Roll back recent Worker deploy if regression suspected:
             \`\`\`
             cd workers/telemetry && wrangler rollback
             \`\`\`

          ## Side info — last 7d data

          $(head -25 /tmp/insights.md 2>/dev/null || echo "(report generation also failed)")
          EOF

      - name: Send email
        if: steps.decide.outputs.send == 'true'
        uses: dawidd6/action-send-mail@611879133a9569642c41be66f4a323286e9b8a3b # v4.0.0
        with:
          server_address: smtp.gmail.com
          server_port:    587
          secure:         false
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          from:           great_cto insights <${{ secrets.SMTP_USERNAME }}>
          to:             ${{ secrets.INSIGHTS_RECIPIENT }}
          subject:        ${{ steps.decide.outputs.subject }}
          body:           file:///tmp/insights.md
          convert_markdown: true

      - name: Summary
        run: |
          echo "## Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Smoke: \`${{ steps.smoke.outputs.smoke_status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Events (7d): \`${{ steps.report.outputs.events }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Threshold: \`${{ env.EVENT_THRESHOLD }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Decision: \`${{ steps.decide.outputs.kind }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Email sent: \`${{ steps.decide.outputs.send }}\`" >> "$GITHUB_STEP_SUMMARY"
