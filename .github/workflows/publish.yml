name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to attach the SBOM to the GitHub release
      id-token: write   # required for OIDC Trusted Publisher

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/cli
        run: npm ci

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Generate CycloneDX SBOM
        working-directory: packages/cli
        run: npx --yes @cyclonedx/cyclonedx-npm@^2 --output-format JSON --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: packages/cli/sbom.cdx.json
          if-no-files-found: error

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload "${GITHUB_REF_NAME}" packages/cli/sbom.cdx.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish (OIDC — no token needed)
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
