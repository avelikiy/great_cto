name: Awesome-list health check

# Weekly check that great_cto entries are still present in awesome-lists.
# Opens a GitHub issue if any list dropped us, so we know to re-PR.
#
# Add new lists to MATRIX as we get accepted into them.

on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    # Lists chosen for great_cto fit:
    #   - awesome-ai-sdks: e2b-dev's framework/SDK list — perfect fit (PR #185 submitted 2026-05)
    #   - awesome-claude-code (hesreallyhim): does NOT accept PRs (web-form-only),
    #     but worth tracking for visibility — manual submission needed
    #   - awesome-claude-code-plugins: code-bundling list, not external-link friendly,
    #     skip from auto-tracking
    #
    # Removed (wrong fits):
    #   - awesome-mcp-servers — we're a plugin that bundles an MCP, not an MCP server
    #   - awesome-ai-agents (e2b-dev) — that list is for autonomous agents themselves,
    #     not frameworks/SDKs (use awesome-ai-sdks instead)
    strategy:
      fail-fast: false
      matrix:
        list:
          - name: awesome-ai-sdks
            url: https://raw.githubusercontent.com/e2b-dev/awesome-ai-sdks/main/README.md
          - name: awesome-claude-code
            url: https://raw.githubusercontent.com/hesreallyhim/awesome-claude-code/main/README.md

    steps:
      - name: Check listing
        id: check
        run: |
          STATUS=$(curl -sL --max-time 30 "${{ matrix.list.url }}" | grep -ic "great[_-]cto\|great-cto" || true)
          echo "found=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" -eq 0 ]; then
            echo "::warning::Not listed in ${{ matrix.list.name }}"
          else
            echo "✓ Listed in ${{ matrix.list.name }} ($STATUS mention(s))"
          fi

      - name: Open issue if missing
        if: steps.check.outputs.found == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'awesome-list-missing'
            });
            const exists = issues.find(i => i.title.includes('${{ matrix.list.name }}'));
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Missing from ${{ matrix.list.name }}',
                body: 'Weekly health check found great_cto is no longer listed in [${{ matrix.list.name }}](${{ matrix.list.url }}). Open a PR to re-list.',
                labels: ['awesome-list-missing', 'distribution']
              });
            }
