name = "great-cto-telemetry"
main = "index.ts"
compatibility_date = "2026-05-10"
workers_dev = true

# D1 database for raw events (30-day TTL via daily cron).
# Created via: wrangler d1 create great-cto-telemetry
# After creation, set the database_id below from the wrangler output.
[[d1_databases]]
binding = "DB"
database_name = "great-cto-telemetry"
database_id = "b847fd59-b198-46c7-86a5-eb0055d085d3"

# Daily cleanup cron — drops events older than 30 days.
[triggers]
crons = ["0 3 * * *"]   # 03:00 UTC daily
