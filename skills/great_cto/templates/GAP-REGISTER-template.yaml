# GAP-REGISTER — governance gap register (NaCl governance Phase 5)
#
# name: GAP-REGISTER-template
# description: Enumerates every governance/gate gap found by /audit or /migrate on an existing
#   codebase, so strict-mode gates (Phase 2) can be adopted incrementally instead of blocking
#   on day one. Each gap carries a severity, the gate it would block, a remediation wave, and —
#   while deferred — an interim signed exception id (Phase 1). Machine-checkable via
#   scripts/lib/gap-waves.mjs.
# when_to_use: /audit (project-auditor) and /migrate emit this to docs/governance/GAP-REGISTER.yaml
#   when strict gates would otherwise block a legacy repo. Paired with GAP-WAVE-PLAN.yaml.
# destination: docs/governance/GAP-REGISTER.yaml
#
# A gap is OPEN until its remediation lands. An OPEN gap scheduled for a LATER wave must carry an
# `exception` id (a valid signed Phase-1 exception) or its gate blocks. Close the gap → drop the
# exception. `node scripts/lib/gap-waves.mjs plan docs/governance/GAP-REGISTER.json` validates this
# (feed it the JSON form, or the agent renders this YAML from the planner output).

feature: <slug>                 # feature / repo area this register covers
generated: <YYYY-MM-DD>         # when /audit or /migrate produced it
generated_by: audit             # audit | migrate
current_wave: 1                 # the wave being actively remediated right now

gaps:
  - id: GAP-1
    gate: gate:ship             # which gate this gap would block (gate:ship | gate:qa | gate:arch | …)
    severity: critical          # critical | high | medium | low  (criticals are never deferred past wave 1)
    summary: <one line — what is missing / failing>
    found_by: <auditor rule id / check name>      # e.g. "ARCH-A1 missing Non-goals" or "no rollback path"
    evidence: <path:line or short proof>
    status: open                # open | closed
    wave: 1                     # remediation wave (from GAP-WAVE-PLAN.yaml)
    exception: null             # interim signed exception id (EXC-…) while deferred; null when in current wave or closed
    owner: <agent / person>

  - id: GAP-2
    gate: gate:ship
    severity: high
    summary: <one line>
    found_by: <check>
    evidence: <path:line>
    status: open
    wave: 2
    exception: EXC-<id>         # deferred to wave 2 → covered by a signed, expiring exception NOW

# Rules (enforced by scripts/lib/gap-waves.mjs):
#  - every gap needs an `id`, a `gate`, and a `severity`.
#  - an OPEN gap with wave > current_wave MUST have a non-null `exception` (else its gate blocks).
#  - criticals land in wave 1 regardless of wave size — they are not eligible for deferral.
#  - closing a gap (status: closed) removes it from scheduling and lets you retire its exception.
