# GAP-WAVE-PLAN — incremental gate-gap remediation schedule (NaCl governance Phase 5)
#
# name: GAP-WAVE-PLAN-template
# description: Schedules the gaps in GAP-REGISTER.yaml into remediation waves so a legacy repo
#   can adopt strict-mode gates incrementally. Wave 1 fixes all criticals + the first batch;
#   later waves close the rest. Gaps not yet in the current wave are held green by interim
#   signed exceptions (Phase 1) that expire on the wave's target date — no silent, permanent bypass.
# when_to_use: emitted alongside GAP-REGISTER.yaml by /audit and /migrate. Generated by
#   scripts/lib/gap-waves.mjs planWaves(); reviewed by the CTO at a gate.
# destination: docs/governance/GAP-WAVE-PLAN.yaml
#
# Generate / re-check:
#   node scripts/lib/gap-waves.mjs plan docs/governance/GAP-REGISTER.json --per-wave 5 --current-wave 1
# The planner orders gaps by severity, chunks them into waves, and prints the exact
# `/exception create …` commands for every deferred gap so the gate can pass meanwhile.

feature: <slug>
generated: <YYYY-MM-DD>
strategy: severity-first        # criticals → wave 1; remaining gaps fill waves in severity order
per_wave: 5                     # max non-critical gaps per wave (tune to team throughput)
current_wave: 1

waves:
  - wave: 1
    target_date: <YYYY-MM-DD>   # when this wave's gaps must be closed (drives exception expiry)
    theme: <e.g. "stop the bleeding — criticals + ship-blockers">
    gaps: [GAP-1]               # ids from GAP-REGISTER.yaml
    exit_criteria: all listed gaps status:closed; their interim exceptions retired

  - wave: 2
    target_date: <YYYY-MM-DD>
    theme: <e.g. "test coverage for high-severity surfaces">
    gaps: [GAP-2, GAP-3]
    interim_exceptions:         # deferred gaps held green until this wave lands
      - gap: GAP-2
        exception: EXC-<id>     # signed, expiring on/just-after target_date
    exit_criteria: all listed gaps status:closed

# How a wave advances:
#  1. Work the gaps in `current_wave`; close each in GAP-REGISTER.yaml (status: closed).
#  2. When the wave's exit_criteria are met, bump `current_wave` (here and in the register).
#  3. Re-run the planner: gaps now in the new current wave shed their interim exceptions;
#     the next wave's gaps must each have a fresh signed exception or the gate blocks.
#  4. Repeat until the register has zero open gaps — strict gates now hold with no exceptions.
#
# This is the sanctioned path from "legacy repo fails every strict gate" to "fully gated",
# without ever leaving an untracked, non-expiring bypass in place.
